<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>启点蓝图 · Copilot 副驾驶</title>

<style>
:root{
  --brand:#2F6BFF;--brand-mid:#4A82FF;--brand-dark:#0B2A4A;--brand-light:#7BA1FF;
  --brand-soft:#EBF0FF;--brand-fade:#F3F7FF;--brand-mist:#F8FAFF;
  --bg:#ffffff;--bg-soft:#F3F7FF;--bg-card:#ffffff;--bg-page:#F7F8FA;
  --text:#0B2A4A;--text-secondary:#45607A;--text-tertiary:#8FA6BD;
  --border:#E5EAF2;--border-strong:#CCD7E4;
  --green:#22c55e;--orange:#F59E0B;--red:#dc2626;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:var(--bg-page);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* App shell */
.cop-app{display:flex;height:100vh;width:100vw;background:var(--bg-page)}

/* ════ Left sidebar ════ */
.cop-side{width:240px;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.cop-side-head{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.cop-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--text);text-decoration:none}
.cop-logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--brand-mid));color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;box-shadow:0 2px 6px rgba(47,107,255,.25)}
.cop-mode-tag{margin-top:10px;font-size:10px;background:var(--brand-soft);color:var(--brand);padding:4px 9px;border-radius:6px;display:inline-block;font-weight:600;letter-spacing:.02em}
.cop-side-body{flex:1;overflow-y:auto;padding:8px 8px 16px}
.cop-side-body::-webkit-scrollbar{width:5px}
.cop-side-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cop-side-section{padding:4px 0}
.cop-side-section-title{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;padding:10px 10px 6px}
.cop-side-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s ease;font-size:13px;color:var(--text);text-decoration:none;line-height:1.3}
.cop-side-item:hover{background:var(--bg-soft);color:var(--text)}
.cop-side-item.active{background:var(--brand-soft);color:var(--brand);font-weight:600}
.cop-side-item .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.cop-side-item .label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cop-side-item .kbd{margin-left:auto;font-size:10px;color:var(--text-tertiary);background:var(--bg-soft);padding:1px 6px;border-radius:4px}
.cop-side-foot{padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-tertiary);display:flex;align-items:center;justify-content:space-between}

/* ════ Center main ════ */
.cop-main{flex:1;display:flex;flex-direction:column;background:var(--bg-page);overflow:hidden;min-width:0}
.cop-top{height:64px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;gap:16px}
.cop-top-title{text-align:center;flex:1;min-width:0}
.cop-top-title h1{font-size:15px;font-weight:600;color:var(--text);margin:0;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cop-top-title p{font-size:11px;color:var(--text-tertiary);margin:3px 0 0;line-height:1.3}
.cop-top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.cop-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s ease;border:1px solid var(--border);background:var(--bg-card);color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:6px;line-height:1}
.cop-btn:hover{background:var(--brand-soft);border-color:var(--brand);color:var(--brand);transform:translateY(-1px)}
.cop-btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.cop-btn.primary:hover{background:var(--brand-mid);color:#fff;box-shadow:0 4px 12px rgba(47,107,255,.25)}

.cop-center{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:880px;width:100%;margin:0 auto;padding:0 32px}
.cop-stage{flex:1;overflow-y:auto;display:flex;flex-direction:column;justify-content:center;padding:24px 0 16px;scroll-behavior:smooth}
.cop-stage.has-messages{justify-content:flex-start;padding-top:24px}
.cop-stage::-webkit-scrollbar{width:5px}
.cop-stage::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cop-welcome{text-align:center;padding:24px 0}
.cop-welcome h2{font-size:30px;font-weight:700;color:var(--text);margin:0 0 10px;background:linear-gradient(135deg,var(--brand),var(--brand-mid));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.01em}
.cop-welcome p{font-size:14px;color:var(--text-tertiary);margin:0 0 32px;line-height:1.5}
.cop-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:780px;margin:0 auto}
.cop-chip{padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;font-size:12.5px;color:var(--text-secondary);cursor:pointer;transition:all .2s ease;line-height:1.5;text-align:left;font-family:inherit}
.cop-chip:hover{background:var(--brand-soft);border-color:var(--brand);color:var(--brand);transform:translateY(-2px);box-shadow:0 4px 12px rgba(47,107,255,.12)}

.cop-messages{display:flex;flex-direction:column;gap:18px;padding:8px 0 8px}
.cop-msg{display:flex;gap:12px;animation:copMsgIn .25s ease both;max-width:88%}
.cop-msg.user{align-self:flex-end;flex-direction:row-reverse}
.cop-msg-avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;background:linear-gradient(135deg,var(--brand),var(--brand-mid));color:#fff}
.cop-msg.bot .cop-msg-avatar{background:linear-gradient(135deg,var(--brand-soft),var(--brand-fade));color:var(--brand);border:1px solid var(--border)}
.cop-msg-bubble{padding:12px 16px;border-radius:14px;font-size:13.5px;line-height:1.7;word-wrap:break-word;white-space:pre-wrap}
.cop-msg.user .cop-msg-bubble{background:linear-gradient(135deg,var(--brand),var(--brand-mid));color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(47,107,255,.18)}
.cop-msg.bot .cop-msg-bubble{background:var(--bg-card);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
@keyframes copMsgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ════ Input area ════ */
.cop-input-area{padding:10px 0 20px;flex-shrink:0}
.cop-input-wrap{background:var(--bg-card);border:1.5px solid var(--border-strong);border-radius:18px;padding:6px 6px 6px 14px;box-shadow:0 4px 18px rgba(11,42,74,.06);transition:all .2s ease}
.cop-input-wrap:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft),0 4px 18px rgba(47,107,255,.1)}
.cop-tools{display:flex;align-items:center;gap:2px;padding:4px 0;flex-wrap:wrap;max-height:36px;overflow:hidden}
.cop-tool{height:28px;min-width:28px;padding:0 6px;border-radius:7px;border:none;background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all .15s ease;font-size:14px;gap:4px}
.cop-tool:hover{background:var(--brand-soft);color:var(--brand)}
.cop-tool.more{padding:0 10px;width:auto;font-size:12px;font-weight:500;color:var(--text-tertiary)}
.cop-input-row{display:flex;align-items:flex-end;gap:8px;padding:4px 0}
.cop-input{flex:1;border:none;outline:none;background:transparent;padding:8px 4px;font-size:14px;color:var(--text);font-family:inherit;resize:none;max-height:140px;line-height:1.5;min-height:24px}
.cop-input::placeholder{color:var(--text-tertiary)}
.cop-send{width:36px;height:36px;border-radius:50%;background:var(--brand);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s ease}
.cop-send:hover{background:var(--brand-mid);transform:scale(1.05)}
.cop-send:disabled{background:var(--border-strong);cursor:not-allowed;transform:none}
.cop-bottom-row{display:flex;align-items:center;justify-content:space-between;padding:6px 4px 0;font-size:11px;color:var(--text-tertiary);gap:8px}
.cop-model-select{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);font-size:11px;color:var(--text-secondary);cursor:pointer;font-family:inherit}
.cop-model-select:focus{outline:none;border-color:var(--brand)}

/* ════ Right sidebar ════ */
.cop-right{width:320px;background:var(--bg-card);border-left:1px solid var(--border);flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column}
.cop-right-head{padding:18px 20px 12px;border-bottom:1px solid var(--border)}
.cop-right-head h3{font-size:15px;font-weight:700;color:var(--text);margin:0 0 4px;display:flex;align-items:center;gap:8px}
.cop-right-head p{font-size:11px;color:var(--text-tertiary);margin:0;line-height:1.5}
.cop-tasks{padding:14px 16px;display:flex;flex-direction:column;gap:9px}
.cop-task{display:flex;align-items:flex-start;gap:12px;padding:13px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s ease;background:var(--bg-card)}
.cop-task:hover{border-color:var(--brand);background:var(--brand-soft);transform:translateY(-1px);box-shadow:0 4px 12px rgba(47,107,255,.1)}
.cop-task-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--brand-soft),var(--brand-fade));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cop-task-info{flex:1;min-width:0}
.cop-task-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.cop-task-desc{font-size:11px;color:var(--text-tertiary);line-height:1.4}
.cop-right-foot{padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text-tertiary);text-align:center;line-height:1.5}

/* ════ Toast ════ */
.cop-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s ease;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);max-width:80vw;text-align:center}
.cop-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ════ Responsive ════ */
@media (max-width:1180px){
  .cop-right{width:280px}
  .cop-chips{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:980px){
  .cop-right{display:none}
}
@media (max-width:720px){
  .cop-side{width:60px}
  .cop-side .cop-logo-text,.cop-mode-tag,.cop-side-item .label,.cop-side-item .kbd,.cop-side-section-title,.cop-side-foot span{display:none}
  .cop-side-item{justify-content:center;padding:10px 0}
  .cop-center{padding:0 16px}
  .cop-chips{grid-template-columns:1fr}
}

// ════ Toast / Nav ════
function copToast(msg){
  var t=document.getElementById('copToast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.classList.remove('show')},2200);
}

// 异步校准登录状态：同时检查 Supabase 会话与 localStorage
async function copIsLoggedIn(){
  if(sbReady && supabaseClient){
    try{
      const {data:{session}}=await supabaseClient.auth.getSession();
      if(session) return true;
    }catch(e){}
  }
  return !!getStoredUser();
}
async function copGoWorkspace(){
  if(await copIsLoggedIn()){
    copToast('正在切换到我的蓝图…');
    setTimeout(function(){window.location.href='./index.html?ws=1'},200);
  }else{
    copToast('请先登录后再进入我的蓝图');
    setTimeout(function(){window.location.href='./index.html'},1400);
  }
}

function copNewChat(){
  document.getElementById('copMessages').style.display='none';
  document.getElementById('copMessages').innerHTML='';
  document.getElementById('copWelcome').style.display='block';
  document.getElementById('copStage').classList.remove('has-messages');
  document.getElementById('copInput').value='';
  copToast('已开启新对话');
}

function copPrefill(text){
  var input=document.getElementById('copInput');
  input.value=text;
  input.focus();
  // 自动增高
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,140)+'px';
}

// ════ Chat ════
function addCopMsg(role,text){
  var box=document.getElementById('copMessages');
  var wrap=document.createElement('div');
  wrap.className='cop-msg '+role;
  var avatarText=role==='user'?'你':'启';
  wrap.innerHTML='<div class="cop-msg-avatar">'+avatarText+'</div><div class="cop-msg-bubble"></div>';
  wrap.querySelector('.cop-msg-bubble').textContent=text;
  box.appendChild(wrap);
  var stage=document.getElementById('copStage');
  stage.scrollTop=stage.scrollHeight;
  return wrap;
}

async function copSend(){
  var input=document.getElementById('copInput');
  var q=input.value.trim();
  if(!q)return;
  input.value='';
  input.style.height='auto';
  var welcome=document.getElementById('copWelcome');
  var msgs=document.getElementById('copMessages');
  var stage=document.getElementById('copStage');
  if(welcome)welcome.style.display='none';
  msgs.style.display='flex';
  stage.classList.add('has-messages');
  addCopMsg('user',q);
  var placeholder=addCopMsg('bot','启点助手正在思考…');
  if(!sbReady||!supabaseClient||!isLoggedIn()){
    placeholder.querySelector('.cop-msg-bubble').textContent='请先登录后再使用 Copilot 对话。点右上角"回到首页"登录后再来 ✨';
    return;
  }
  try{
    var context=buildCopContext();
    var {data,error}=await supabaseClient.functions.invoke('ask-qidian',{body:{message:q,context:context}});
    if(error)throw error;
    if(data&&data.reply){
      placeholder.querySelector('.cop-msg-bubble').textContent=data.reply;
    }else if(data&&data.error){
      placeholder.querySelector('.cop-msg-bubble').textContent='⚠️ '+data.error+'（请确认站长已部署问启点服务并配置 DeepSeek key）';
    }else{
      placeholder.querySelector('.cop-msg-bubble').textContent='（未获取到回答）';
    }
  }catch(e){
    var msg='调用失败：'+(e&&e.message?e.message:String(e));
    if(/Failed to fetch|network|load|404/i.test(msg)) msg='问启点服务尚未部署或网络异常，请稍后重试。';
    placeholder.querySelector('.cop-msg-bubble').textContent=msg;
  }finally{
    stage.scrollTop=stage.scrollHeight;
  }
}

function copKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    copSend();
  }
}

// 输入框自动增高
document.addEventListener('DOMContentLoaded',function(){
  var input=document.getElementById('copInput');
  input.addEventListener('input',function(){
    this.style.height='auto';
    this.style.height=Math.min(this.scrollHeight,140)+'px';
  });
  // 工具按钮 → toast
  document.querySelectorAll('.cop-tool').forEach(function(b){
    b.addEventListener('click',function(){
      copToast('「'+(b.getAttribute('data-tool')||'该工具')+'」功能即将上线 ✨');
    });
  });
  // 「我的蓝图」按钮（async 校准 Supabase 登录）
  var goWsBtn=document.getElementById('copGoWorkspaceBtn');
  if(goWsBtn){
    goWsBtn.addEventListener('click',function(e){
      e.preventDefault();
      copGoWorkspace();
    });
  }
  // 全局快捷键 ⌘K 新对话
  document.addEventListener('keydown',function(e){
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){
      e.preventDefault();
      copNewChat();
    }
  });
  // 首次渲染
  renderCopSide();
  renderCopChips();
  renderCopTasks();
  renderCopTop();
  // 异步校准：Supabase 登录状态（修复 localStorage qdbp_user 未写时显示"未登录"）
  (async function(){
    if(sbReady && supabaseClient){
      try{
        const {data:{session}}=await supabaseClient.auth.getSession();
        if(session){
          var pkgId=getCurrentPkgId();
          var ctx=COPILOT_CONTEXT[pkgId]||COPILOT_CONTEXT.kaoyan;
          var name=(session.user&&(session.user.user_metadata&&session.user.user_metadata.name))||(session.user&&session.user.email)||'会员';
          var status=document.getElementById('copStatus');
          if(status) status.textContent='已登录 '+name+' · '+ctx.name;
          // 同步到 localStorage 以便 index.html 的 isLoggedIn() 也能快速判断
          try{
            if(!localStorage.getItem('qdbp_user')){
              localStorage.setItem('qdbp_user',JSON.stringify({name:name,email:(session.user&&session.user.email)||''}));
            }
          }catch(e){}
        }
      }catch(e){}
    }
  })();
});
</script>
